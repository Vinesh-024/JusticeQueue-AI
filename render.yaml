services:
  - type: web
    name: justicequeue-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 3001
      - key: FRONTEND_URL
        sync: false
      - key: MONGO_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: AI_ENGINE_URL
        fromService:
          type: web
          name: justicequeue-ai-engine
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: justicequeue-ai-engine
    env: python
    plan: free
    rootDir: ai-engine
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
